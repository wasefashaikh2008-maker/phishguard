{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - PhishGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            overflow: hidden;
        }

        /* Animated Background Glow */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,255,157,0.4), transparent);
            top: -100px;
            right: -100px;
            filter: blur(100px);
        }

        .form-container {
            position: relative;
            width: 380px;
            padding: 45px 35px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: slideUp 0.6s ease;
            color: #fff;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            color: #00ffb3;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 14px;
            transition: 0.3s ease;
        }

        input::placeholder {
            color: #bbb;
        }

        input:focus {
            border-color: #00ffb3;
            box-shadow: 0 0 10px rgba(0, 255, 179, 0.6);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ffb3, #00b37d);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 255, 179, 0.4);
        }

        .links {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #00ffb3;
            font-weight: 500;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4d4d;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 13px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 420px) {
            .form-container {
                width: 90%;
                padding: 35px 25px;
            }
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>🔒 Login</h2>

    {% if messages %}
        {% for message in messages %}
            <p class="error">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="👤 Username" required>
        <input type="password" name="password" placeholder="🔑 Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="links">
        <p>Don’t have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>

    <div class="links">
        <p>Return Home!! <a href="{% url 'index' %}">Home</a></p>
    </div>
</div>

</body>
</html>
